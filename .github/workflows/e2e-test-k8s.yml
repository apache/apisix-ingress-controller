name: API7EE E2E Test For Kubernetes 1.18

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-test:
    strategy:
      matrix:
        cases_subset:
        - v2
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check Go Env
        run: |
          go env

      - name: Check Kind Version
        run: |
          kind version

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Login to Private Registry
        uses: docker/login-action@v3
        with:
          registry: hkccr.ccs.tencentyun.com
          username: ${{ secrets.PRIVATE_DOCKER_USERNAME }}
          password: ${{ secrets.PRIVATE_DOCKER_PASSWORD }}

      - name: Launch Kind Cluster
        env:
          KIND_NODE_IMAGE: kindest/node:v1.18.15
        run: |
          make kind-down
          make kind-up
          mkdir -p "${HOME}/.kube"
          kind get kubeconfig --name apisix-ingress-cluster --internal > "${HOME}/.kube/config"
          kubectl config use-context kind-apisix-ingress-cluster
          for attempt in {1..30}; do
            if kubectl cluster-info >/dev/null 2>&1; then
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              echo "kind apiserver did not become reachable in time" >&2
              exit 1
            fi
            sleep 2
          done
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

      - name: Build images
        env:
          TAG: dev
          ARCH: amd64
          ENABLE_PROXY: "false"
          BASE_IMAGE_TAG: "debug"
        run: |
          echo "building images..."
          make build-image

      - name: Install v2 CRDs
        run: |
          make install-crds-nocel

      - name: Download API7EE3 Chart
        run: |
          make download-api7ee3-chart

      - name: Loading Docker Image to Kind Cluster
        run: |
          make kind-load-images

      - name: Extract adc binary
        if: ${{ env.ADC_VERSION == 'dev' }}
        run: |
          docker create --name adc-temp ghcr.io/api7/adc:dev
          docker cp adc-temp:main.cjs adc.js
          docker rm adc-temp
          node $(pwd)/adc.js -v
          echo "ADC_BIN=node $(pwd)/adc.js" >> $GITHUB_ENV

      - name: Start OpenLDAP server
        run: make e2e-ldap

      - name: Run E2E test suite
        shell: bash
        env:
          API7_EE_LICENSE: ${{ secrets.API7_EE_LICENSE }}
          PROVIDER_TYPE: api7ee
          TEST_LABEL: ${{ matrix.cases_subset }}
          INGRESS_VERSION: v1beta1
          TEST_ENV: CI
        run: |
          make e2e-test
